spring.application.name=CivicTrackGuard

# Server port - Cloud Run injects PORT env var
server.port=${PORT:8080}

# Database (TiDB Cloud / MySQL compatible)
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=${JWT_SECRET:your_jwt_secret_key_here_please_change_it_in_production}
jwt.expiration=86400000

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dql3e3poe}
cloudinary.api-key=${CLOUDINARY_API_KEY:845971985727978}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:750p4vGKqKkrynNkrFfp_KDRMYo}

# Gemini AI
gemini.api.key=${GEMINI_API_KEY:your_gemini_api_key}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

# Email (optional - comment out if not configured)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:YOUR_GMAIL}
spring.mail.password=${MAIL_PASSWORD:YOUR_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Frontend URL (for CORS)
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Multipart file upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.ateeq=INFO
